services:
  forward-auth:
    build: .
    image: forward-auth:local
    container_name: forward-auth
    restart: unless-stopped
    env_file:
      - .env   # cp .env.example .env && chmod 600 .env, затем заполнить секреты
    networks:
      - caddy
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 256
    # Без ports: — сервис доступен только внутри сети caddy.
    # Публикация порта обходит Caddy, ломает X-Real-IP и per-IP rate-limit.

networks:
  caddy:
    external: true
