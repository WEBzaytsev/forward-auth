services:
  forward-auth:
    image: ghcr.io/webzaytsev/forward-auth:latest
    container_name: forward-auth
    restart: unless-stopped
    environment:
      # Set these in a local .env file (see .env.example). Never hard-code
      # secrets here. Use a UNIQUE, random SESSION_SECRET per deployment.
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      AUTH_DOMAIN: ${AUTH_DOMAIN:?set AUTH_DOMAIN in .env}
    # No host port mapping: the service must only be reachable by Caddy over
    # the internal "proxy" network, never directly from the host/internet.
    networks:
      - proxy
    # Runtime hardening.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 256

networks:
  proxy:
    external: true
